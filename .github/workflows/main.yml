name: Tailscale Docker CI/CD (Windows)

on:
  push:
    branches: [ "main" ]

jobs:
  deploy-and-docker:
    runs-on: windows-latest

    steps:
    # 1. Code aus dem Repository auschecken
    - name: Checkout code
      uses: actions/checkout@v4

    # 2. Verbindung zum Tailscale Netzwerk aufbauen
    # HINWEIS: Hier steht jetzt TAILESCALE_AUTH_KEY (wie auf deinem Screenshot)
    - name: Connect to Tailscale
      uses: tailscale/github-action@v2
      with:
        authkey: ${{ secrets.TAILESCALE_AUTH_KEY }}

    # 3. Docker Befehle auf Windows ausführen
    - name: Run Docker Build or Command
      shell: pwsh
      run: |
        Write-Host "Verbindung zu Tailscale steht. Windows-Runner ist aktiv."
        
        # Test, ob Docker auf dem Windows-Runner bereit ist
        docker version
        
        # Hier deine Docker-Befehle eintragen, z.B.:
        # docker build -t mein-app-image:latest .
