name: Tailscale Docker Windows 11 VPS

on:
  push:
    branches: [ "main" ]

jobs:
  deploy-to-windows:
    runs-on: ubuntu-latest

    steps:
    # 1. Code aus dem Repository auschecken
    - name: Checkout code
      uses: actions/checkout@v4

    # 2. Verbindung über den Tailscale Auth-Key aufbauen
    - name: Connect to Tailscale
      uses: tailscale/github-action@v2
      with:
        authkey: ${{ secrets.TAILESCALE_AUTH_KEY }}

    # 3. SSH-Passpass-Tool installieren (damit wir das Passwort per Skript übergeben können)
    - name: Install sshpass
      run: sudo apt-get update && sudo apt-get install -y sshpass

    # 4. Über SSH direkt auf dem Windows 11 VPS einloggen und Docker steuern
    - name: Run Docker on Windows 11 VPS via SSH
      env:
        VPS_PASS: ${{ secrets.VPS_PASSWORD }}
      run: |
        echo "Verbindung steht. Baue SSH-Sitzung zum Windows 11 VPS auf..."
        
        # WICHTIG: Ersetze '100.11.22.33' mit deiner echten Tailscale-IP!
        # Ersetze 'Administrator' mit deinem echten Benutzernamen des VPS!
        
        sshpass -p "$VPS_PASS" ssh -o StrictHostKeyChecking=no Administrator@100.11.22.33 "docker ps"
