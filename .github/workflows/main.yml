name: Docker direkt auf Runner ausführen

on:
  push:
    branches: [ "main" ]

jobs:
  deploy-local:
    runs-on: ubuntu-latest

    steps:
    # 1. Code aus dem Repository auschecken
    - name: Checkout code
      uses: actions/checkout@v4

    # 2. Direkt Docker-Befehle lokal ausführen
    - name: Run Local Docker Commands
      run: |
        echo "Führe Docker direkt lokal auf dem Runner aus..."
        
        # Kein Export von DOCKER_HOST nötig!
        # Der Linux-Runner greift direkt auf seinen eigenen lokalen Docker-Dienst zu.
        docker ps
