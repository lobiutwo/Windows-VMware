name: Tailscale Docker CI/CD

on:
  push:
    branches: [ "main" ]

jobs:
  deploy-and-docker:
    runs-on: ubuntu-latest

    steps:
    # 1. Code aus dem Repository auschecken
    - name: Checkout code
      uses: actions/checkout@v4

    # 2. Verbindung zum Tailscale Netzwerk aufbauen
    - name: Connect to Tailscale
      uses: tailscale/github-action@v2
      with:
        authkey: ${{ secrets.TAILESCALE_AUTH_KEY }}

    # 3. Befehle über Tailscale an deine VM senden
    - name: Run Remote Commands
      run: |
        echo "Verbindung steht! Hier kannst du deine Infrastruktur ansteuern."
        
        # OOPTION A: Befehl an einen Docker-Host in deinem Tailnet senden
        # (Ersetze 100.x.y.z mit der Tailscale-IP deiner VM)
        # docker -H tcp://100.x.y.z:2375 ps
        
        # OPTION B: Per SSH auf deine VMware/Windows-VM zugreifen
        # ssh -o StrictHostKeyChecking=no user@100.x.y.z "echo 'Hallo von GitHub Actions'"
        
        # Falls du DOCH ein lokales Dockerfile hast, stelle sicher, dass es 
        # exakt 'Dockerfile' (großes D, ohne Dateiendung) im Hauptverzeichnis heißt.
