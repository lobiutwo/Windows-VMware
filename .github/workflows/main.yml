name: Tailscale Docker CI/CD (Fixed)

on:
  push:
    branches: [ "main" ]

jobs:
  deploy-and-docker:
    # Wir MÜSSEN Linux nutzen, da die Tailscale-Action nur Linux unterstützt
    runs-on: ubuntu-latest

    steps:
    # 1. Code aus dem Repository auschecken
    - name: Checkout code
      uses: actions/checkout@v4

    # 2. Verbindung zum Tailscale Netzwerk aufbauen
    # Benutzt deinen Secret-Namen aus dem Screenshot
    - name: Connect to Tailscale
      uses: tailscale/github-action@v2
      with:
        authkey: ${{ secrets.TAILESCALE_AUTH_KEY }}

    # 3. Docker-Umgebung auf dem Linux-Runner bereitstellen
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    # 4. Befehle ausführen
    # Der Linux-Runner ist jetzt in deinem Tailnet und kann deine Server erreichen
    - name: Run Docker or Remote Commands
      run: |
        echo "Erfolgreich! Der Runner ist über Tailscale verbunden."
        
        # Beispiel: Lokaler Docker Build auf dem Runner
        docker build -t mein-app-image:latest .
        
        # Beispiel: Falls du deine Windows-VM/VMware über SSH steuern willst (Beispiel-IP):
        # ssh -o StrictHostKeyChecking=no Administrator@100.x.y.z "powershell-befehl-hier"
