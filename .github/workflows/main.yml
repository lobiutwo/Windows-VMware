name: Tailscale Docker CI/CD (API OAuth - Safe Mode)

on:
  push:
    branches: [ "main" ]

jobs:
  deploy-and-docker:
    runs-on: ubuntu-latest

    steps:
    # 1. Code aus dem Repository auschecken
    - name: Checkout code
      uses: actions/checkout@v4

    # 2. Verbindung über die Tailscale API aufbauen
    # Hier füttern wir nun beide Eventualitäten, damit nichts leer bleibt!
    - name: Connect to Tailscale
      uses: tailscale/github-action@v2
      with:
        oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID || secrets.TS_OAUTH_SECRET }}
        oauth-secret: ${{ secrets.TS_OAUTH_SECRET || secrets.TS_OAUTH_CLIENT_ID }}

    # 3. Docker-Befehle an deine VM senden
    - name: Run Remote Docker Commands
      run: |
        echo "Verbindung steht über OAuth API!"
        
        # Holt sich die IP aus deinem TARGET_IP Secret
        export DOCKER_HOST="tcp://${{ secrets.TARGET_IP }}:2375"
        
        # Testet die Verbindung zu deinem Docker-Server
        docker ps
