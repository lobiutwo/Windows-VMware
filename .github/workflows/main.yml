name: Tailscale Docker CI/CD

on:
  push:
    branches: [ "main" ]

jobs:
  deploy-and-docker:
    runs-on: ubuntu-latest

    steps:
    # 1. Code aus dem Repository auschecken
    - name: Checkout code
      uses: actions/checkout@v4

    # 2. Verbindung zum Tailscale Netzwerk aufbauen
    - name: Connect to Tailscale
      uses: tailscale/github-action@v2
      with:
        authkey: ${{ secrets.TAILESCALE_AUTH_KEY }}

    # 3. Docker-Befehle an deine VM im Tailscale-Netzwerk senden
    - name: Run Remote Docker Commands
      run: |
        echo "Verbindung steht! Kontaktiere entfernten Docker-Host..."
        
        # GitHub setzt hier jetzt automatisch deine echte IP aus den Secrets ein
        export DOCKER_HOST="tcp://${{ secrets.TARGET_IP }}:2375"
        
        # Test: Zeigt dir die Container an, die auf deiner VM laufen
        docker ps
