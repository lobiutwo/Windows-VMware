name: Tailscale Docker CI/CD

on:
  push:
    branches: [ "main" ]

jobs:
  deploy-and-docker:
    runs-on: ubuntu-latest

    steps:
    # 1. Code aus dem Repository auschecken
    - name: Checkout code
      uses: actions/checkout@v4

    # 2. Verbindung zum Tailscale Netzwerk aufbauen
    - name: Connect to Tailscale
      uses: tailscale/github-action@v2
      with:
        authkey: ${{ secrets.TAILESCALE_AUTH_KEY }}

    # 3. Docker-Befehle an deine VM im Tailscale-Netzwerk senden
    - name: Run Remote Docker Commands
      run: |
        echo "Verbindung steht! Kontaktiere entfernten Docker-Host..."
        
        # ERSETZE '100.x.y.z' MIT DER TAILSCALE-IP DEINER VM!
        # Damit sagst du GitHub, dass es Docker-Befehle direkt auf deiner VM ausführen soll.
        export DOCKER_HOST="tcp://100.x.y.z:2375"
        
        # Test: Zeigt dir die Container an, die auf deiner VM laufen
        docker ps
        
        # Hier kannst du jetzt deine Container starten, z.B.:
        # docker run -d -p 80:80 nginx
