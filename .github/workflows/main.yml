name: Tailscale Docker Windows 11 VPS

on:
  push:
    branches: [ "main" ]

jobs:
  deploy-to-windows:
    runs-on: ubuntu-latest

    steps:
    # 1. Code aus dem Repository auschecken
    - name: Checkout code
      uses: actions/checkout@v4

    # 2. Verbindung über den Tailscale Auth-Key aufbauen
    - name: Connect to Tailscale
      uses: tailscale/github-action@v2
      with:
        authkey: ${{ secrets.TAILESCALE_AUTH_KEY }}

    # 3. IP automatisch herausfinden und Docker starten
    - name: Run Docker on Windows VPS
      run: |
        echo "Suche VPS-IP im Tailscale-Netzwerk..."
        
        # Holt sich automatisch die 100.x.x.x IP deines Windows-Geräts.
        # Falls dein PC in Tailscale anders heißt, ersetze 'windows-vps' mit dem echten Namen!
        TARGET_IP=$(tailscale ip -4 windows-vps)
        
        echo "Gefundene IP: $TARGET_IP"
        
        export DOCKER_HOST="tcp://${TARGET_IP}:2375"
        
        # Direkt der Docker-Befehl
        docker ps
