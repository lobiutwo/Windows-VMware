name: Tailscale Docker CI/CD

# Der Workflow startet bei jedem Push auf den main-Branch
on:
  push:
    branches: [ "main" ]

jobs:
  deploy-and-docker:
    runs-on: ubuntu-latest

    steps:
    # 1. Code aus dem Repository auschecken
    - name: Checkout code
      uses: actions/checkout@v4

    # 2. Verbindung zum Tailscale Netzwerk aufbauen
    - name: Connect to Tailscale
      uses: tailscale/github-action@v2
      with:
        authkey: ${{ secrets::TAILSCALE_AUTH_KEY }}

    # 3. Docker-Umgebung einrichten (falls du ein Image bauen willst)
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    # 4. Beispiel: Docker Befehl ausführen
    # Da Tailscale aktiv ist, kann der Runner nun z.B. auf private Registries 
    # oder einen Docker-Host in deinem Tailnet zugreifen.
    - name: Run Docker Build or Command
      run: |
        echo "Verbindung zu Tailscale steht. Führe Docker-Befehle aus..."
        # Beispiel 1: Lokal im Runner ein Image bauen
        docker build -t mein-app-image:latest .
        
        # Beispiel 2: Falls du docker-compose auf einem entfernten Server im Tailnet triggern willst (Beispiel-IP: 100.10.20.30)
        # ssh -o StrictHostKeyChecking=no user@100.10.20.30 "cd /app && docker compose pull && docker compose up -d"
