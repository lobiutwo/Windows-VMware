name: Tailscale Docker CI/CD

on:
  push:
    branches: [ "main" ]

jobs:
  deploy-and-docker:
    runs-on: ubuntu-latest

    steps:
    # 1. Code aus dem Repository auschecken
    - name: Checkout code
      uses: actions/checkout@v4

    # 2. Verbindung über den Auth-Key aufbauen
    - name: Connect to Tailscale
      uses: tailscale/github-action@v2
      with:
        authkey: ${{ secrets.TAILESCALE_AUTH_KEY }}

    # 3. Docker-Befehle direkt an die feste IP senden
    - name: Run Remote Docker Commands
      run: |
        echo "Verbindung steht über Auth-Key!"
        
        # WICHTIG: Ersetze 100.11.22.33 mit deiner echten Tailscale-IP!
        export DOCKER_HOST="tcp://100.11.22.33:2375"
        
        # Testet die Verbindung zu deinem entfernten Docker-Server
        docker ps
