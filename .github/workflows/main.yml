name: Tailscale Docker Windows 11 VPS

on:
  push:
    branches: [ "main" ]

jobs:
  deploy-to-windows:
    runs-on: ubuntu-latest

    steps:
    # 1. Code aus dem Repository auschecken
    - name: Checkout code
      uses: actions/checkout@v4

    # 2. Verbindung über den Tailscale Auth-Key aufbauen
    - name: Connect to Tailscale
      uses: tailscale/github-action@v2
      with:
        authkey: ${{ secrets.TAILESCALE_AUTH_KEY }}

    # 3. Netzwerk-Verbindung prüfen und Docker kontaktieren
    - name: Test Connection and Run Docker
      run: |
        # Trage hier deine ECHTE Tailscale-IP ein
        TARGET_IP="100.11.22.33"
        
        echo "1. Prüfe, ob der Windows-VPS im Tailscale-Netzwerk online ist..."
        if ping -c 3 "$TARGET_IP" > /dev/null 2>&1; then
          echo "✅ VPS ist über Tailscale erreichbar!"
        else
          echo "❌ Fehler: VPS antwortet nicht auf Ping. Prüfe, ob Tailscale auf dem VPS läuft!"
          exit 1
        fi
        
        echo "2. Versuche Docker auf Port 2375 zu erreichen..."
        export DOCKER_HOST="tcp://${TARGET_IP}:2375"
        
        # Führt den Befehl mit einem kurzen Timeout aus, damit GitHub nicht 2 Minuten hängt
        if docker --timeout 10 version > /dev/null 2>&1; then
          echo "✅ Docker-Verbindung erfolgreich!"
          docker ps
        else
          echo "❌ Fehler: Docker-Port 2375 antwortet nicht."
          echo "👉 HINWEIS: Auf dem Windows 11 VPS muss in den Docker Desktop Einstellungen"
          echo "   das Häkchen bei 'Expose daemon on tcp://localhost:2375 without TLS' aktiv sein!"
          exit 1
        fi
